<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamesy-tech</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">

<link rel="icon" href="icon3.png">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Inter", sans-serif;
  }

  body {
    background: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #ffffff;
    padding: 50px 22px 24px;
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 32px;
    color: #222;
    text-align: center;
  }

  .btn {
    display: flex;
    align-items: center;
    padding: 20px;
    cursor:pointer;
    margin-bottom: 16px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 17px;
    font-weight: 500;

    border: 2px solid transparent;
    outline: 0px solid transparent;
    outline-offset: 0px;

    transition: outline 0.2s ease, outline-offset 0.2s ease;
  }

  .open  { background: #e3f1f0; color: #2f7f78; }
  .docs  { background: #e7f2e7; color: #3d7a47; }
  .draw  { background: #f5edd3; color: #9a7a2f; }
  .code  { background: #e7edf5; color: #3c6fa3; }
  .notes { background: #f6e9dd; color: #b36a2d; }

  .open:hover  { outline: 3px solid #2f7f78; outline-offset: 4px; }
  .docs:hover  { outline: 3px solid #3d7a47; outline-offset: 4px; }
  .draw:hover  { outline: 3px solid #9a7a2f; outline-offset: 4px; }
  .code:hover  { outline: 3px solid #3c6fa3; outline-offset: 4px; }
  .notes:hover { outline: 3px solid #b36a2d; outline-offset: 4px; }

  @media (max-width: 600px) {
    body {
      background: #ffffff;
    }

    .phone {
      max-width: 100%;
      padding: 32px 18px;
    }
  }

.image {
    width:25%;
    text-align: center;
    margin-bottom:20px;
}

.branding {
  cursor:pointer;
}

</style>
</head>

<body>

<div class="phone">

    <center>

 <div class="branding" onclick="window.top.location.href = 'https://jamesy-tech.github.io';">  <img src="icon.png" class="image">

    <h1>Jamesy-tech</h1> </div>

  <a class="btn open" onclick='window.top.location.href="https://jamesy-tech.github.io/jamesy-creator";'>Jamesy Creator</a>
<a class="btn code" onclick='window.top.location.href="https://jamesy-tech.github.io/BookUI/dashboard.html";'>BookUI</a>
<a class="btn code" onclick='window.top.location.href="https://jamesy-tech.github.io/scripts";'>Jamscripts</a>
<a class="btn docs" onclick='window.top.location.href="https://jamesy-tech.github.io/ZacLabs";'>ZacLabs</a>
<a class="btn draw" onclick='window.top.location.href="https://youtube.com/@jamesydeveloper";'>@JamesyDeveloper (YouTube)</a>
  <a class="btn notes" onclick='window.top.location.href="https://github.com/Jamesy-tech/command-bookmarklets";'>command-bookmarklets</a>
  <a class="btn notes" onclick='window.top.location.href="https://github.com/Jamesy-tech/sound-bookmarklets";'>sound-bookmarklets</a>
  
  </center>

</div>

</body>
</html>
