<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamesy-tech</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<link rel="icon" href="icon3.png">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Inter", sans-serif;
  }

  body {
    background: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #ffffff;
    padding: 50px 22px 24px;
    display: flex;
    flex-direction: column;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 32px;
    color: #222;
    text-align: center;
  }

  .btn {
    display: flex;
    align-items: center;
    padding: 20px;
    cursor:pointer;
    margin-bottom: 16px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 17px;
    font-weight: 500;

    border: 2px solid transparent;
    outline: 0px solid transparent;
    outline-offset: 0px;

    transition: outline 0.2s ease, outline-offset 0.2s ease;
  }

  .green       { background: #e3f1f0; color: #2f7f78; }
  .blue        { background: #e7edf5; color: #3c6fa3; }
  .brown       { background: #f6e9dd; color: #b36a2d; }
.pink { background: rgba(255, 182, 193, 0.4); color: #7a2f5c; }

  .green:hover   { outline: 3px solid #2f7f78; outline-offset: 4px; }
  .blue:hover    { outline: 3px solid #3c6fa3; outline-offset: 4px; }
  .brown:hover   { outline: 3px solid #b36a2d; outline-offset: 4px; }
  .pink:hover    { outline: 3px solid #7a2f5c; outline-offset: 4px; }

  .purple       { background: rgba(215, 179, 255, 0.4); color: #4a1f70; }
  .orange       { background: rgba(255, 203, 153, 0.4); color: #b35c1f; }
  .purple:hover { outline: 3px solid rgba(74,31,112,0.7); outline-offset: 4px; }
  .orange:hover { outline: 3px solid rgba(179,92,31,0.7); outline-offset: 4px; }

  @media (max-width: 600px) {
    body { background: #ffffff; }
    .phone { max-width: 100%; padding: 32px 18px; }
  }

  .image {
    width:25%;
    text-align: center;
    margin-bottom:20px;
  }

  .branding {
    cursor:pointer;
  }

</style>
</head>

<body>

<div class="phone">
    <center>
        <div class="branding" onclick="window.top.location.href = 'https://jamesy-tech.github.io';">
            <img src="icon.png" class="image">
            <h1>Jamesy-tech</h1>
        </div>

        <a class="btn green" onclick='window.top.location.href="https://jamesy-tech.github.io/jamesy-creator";'>Jamesy Creator</a>
        <a class="btn blue" onclick='window.top.location.href="https://jamesy-tech.github.io/BookUI/dashboard.html";'>BookUI</a>
        <a class="btn blue" onclick='window.top.location.href="https://jamesy-tech.github.io/scripts";'>Jamscripts</a>
        <a class="btn brown" onclick='window.top.location.href="https://github.com/Jamesy-tech/command-bookmarklets";'>command-bookmarklets</a>
        <a class="btn brown" onclick='window.top.location.href="https://github.com/Jamesy-tech/sound-bookmarklets";'>sound-bookmarklets</a>
 <a class="btn pink" onclick='window.top.location.href="https://youtube.com/@jamesydeveloper";'>@JamesyDeveloper (YouTube)</a>
        <a class="btn pink" onclick='window.top.location.href="https://github.com/Jamesy-tech";'>@Jamesy-tech (GitHub)</a>

    </center>
</div>

</body>
</html>
